<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WeStars </title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'AppleEmojiCustom';
            src: url('iOS_14.6.ttf') format('truetype');
            unicode-range: U+1F600-1F64F, U+1F300-1F5FF, U+1F680-1F6FF, U+2600-26FF, U+2700-27BF, U+1F900-1F9FF, U+1F1E6-1F1FF;
        }

        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #0a0a0b;
            --card: #161618;
            --input-border: #2d2d30;
            --accent: #00d1b2;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff4757;
            --star-color: #f1c40f;
            --tiktok-bg: #000000;
        }

        [data-theme="light"] {
            --bg: #f5f6fa;
            --card: #ffffff;
            --input-border: #dcdde1;
            --text: #1a1a1c;
            --text-dim: #57606f;
            --tiktok-bg: #000000; 
        }

        * { 
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'AppleEmojiCustom', 'IBM Plex Sans Arabic', sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative;
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .top-controls-right {
            position: absolute; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 1000;
        }

        .icon-btn {
            width: 42px; height: 42px;
            background: var(--card); border: 1px solid var(--input-border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary); font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .full-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000; display: flex; flex-direction: column; align-items: center;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            padding: 20px;
            overflow-y: auto;
        }
        .full-overlay.active { transform: translateY(0); }
        .close-overlay { align-self: flex-start; margin-bottom: 20px; font-size: 1.5rem; cursor: pointer; color: var(--primary); }

        .social-accordion { width: 100%; max-width: 400px; margin-top: 10px; }
        .social-header { background: var(--card); border: 1px solid var(--input-border); padding: 16px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 700; color: var(--primary); transition: 0.3s; }
        .social-header:hover { border-color: var(--primary); }
        .social-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); display: flex; flex-direction: column; gap: 10px; padding-top: 0; }
        .social-accordion.open .social-content { max-height: 1000px; transition: max-height 1s ease-in-out; padding-top: 15px; }
        .social-accordion.open .fa-chevron-down { transform: rotate(180deg); }

        .social-card { width: 100%; max-width: 400px; padding: 16px; margin-bottom: 0px; border-radius: 18px; text-decoration: none; color: white !important; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .social-tiktok { background: var(--tiktok-bg); border: 1px solid #333; }
        .social-insta { background: linear-gradient(45deg, #f09433, #bc1888); }
        .social-fb { background: #1877f2; }
        .social-yt { background: #ff0000; }

        .brand { font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 900; margin: 80px 0 30px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .container { width: 100%; max-width: 550px; padding: 0 10px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 20px 55px 20px 20px; background: var(--card); border: 2px solid var(--input-border); border-radius: 22px; color: var(--text); font-size: 1rem; outline: none; text-align: right; direction: ltr; }
        .input-box::placeholder { direction: rtl; color: var(--text-dim); }
        .paste-btn { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem; cursor: pointer; }
        .main-btn { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 20px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .video-card { display: none; margin-top: 25px; background: var(--card); border-radius: 25px; padding: 15px; border: 1px solid var(--input-border); }
        .video-preview { width: 100%; border-radius: 18px; overflow: hidden; background: #000; position: relative; display: flex; align-items: center; justify-content: center; min-height: 300px; }
        
        #videoContainer { position: relative; width: 100%; display: flex; flex-direction: column; }
        video { width: 100%; max-height: 600px; display: block; cursor: default; }

        #imageSlider { width: 100%; display: none; position: relative; background: #000; overflow: hidden; }
        .slider-wrapper { 
            display: flex; 
            width: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            touch-action: pan-y;
            direction: ltr;
        }
        .slider-img { width: 100%; flex-shrink: 0; object-fit: contain; max-height: 600px; min-height: 300px; display: block; }
        
        .slider-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .slider-arrow-prev { left: 10px; } 
        .slider-arrow-next { right: 10px; }

        .slider-dots {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 90;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .dot { width: 7px; height: 7px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.4s; }
        .dot.active { background: #fff; transform: scale(1.3); }

        .custom-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 15px; display: flex; flex-direction: column; gap: 8px; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 20; }
        .custom-controls.visible { opacity: 1; visibility: visible; }
        .time-display { display: flex; justify-content: space-between; font-size: 0.8rem; color: #fff; font-family: monospace; }
        
        .progress-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; cursor: pointer; position: relative; margin: 12px 0; }
        .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 2px; position: absolute; top: 0; left: 0; pointer-events: none; }
        .progress-handle { 
            position: absolute; 
            top: 50%; 
            right: 0; 
            transform: translate(50%, -50%); 
            width: 14px; 
            height: 14px; 
            background: #ffffff; 
            border-radius: 50%; 
            box-shadow: 0 0 6px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 5;
        }
        
        .player-btns { display: flex; align-items: center; justify-content: space-between; }
        .player-btns-group { display: flex; align-items: center; gap: 18px; }
        .player-btns i { color: #fff; font-size: 1.4rem; cursor: pointer; }

        .skip-feedback { position: absolute; top: 50%; transform: translateY(-50%); width: 80px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 50%; display: none; align-items: center; justify-content: center; flex-direction: column; font-size: 0.8rem; color: #fff; z-index: 5; pointer-events: none; }
        .skip-left { left: 15%; } .skip-right { right: 15%; }

        .video-end-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 25; }
        .replay-icon { width: 70px; height: 70px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 12px; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; flex-direction: row-reverse; }
        .btn-music-action { grid-column: span 2; display: none; background: #34ace0; }
        .btn-reset { grid-column: span 2; color: var(--text); }
        
        .history-section { width: 100%; margin-top: 30px; border-top: 1px solid var(--input-border); padding-top: 20px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-header h3 { font-size: 0.95rem; margin: 0; color: var(--text-dim); }
        .archive-trigger { color: var(--primary); font-size: 1.2rem; cursor: pointer; }
        .history-item { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--input-border); display: flex; align-items: center; justify-content: space-between; gap: 15px; width: 100%; }
        .history-content { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 65px; overflow: hidden; }
        .history-url { direction: ltr; font-size: 0.8rem; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-btn { color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.9rem; align-self: flex-start; }
        .history-thumb { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; background: #222; flex-shrink: 0; }
        
        #customAlert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--input-border); display: flex; align-items: center; gap: 10px; z-index: 10000; transition: 0.4s; color: var(--text); }
        #customAlert.show { top: 20px; }
        .star-loader { display: none; font-size: 1.4rem; color: transparent; -webkit-text-stroke: 1.5px var(--star-color); animation: starAnim 1s infinite linear; }
        @keyframes starAnim { to { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark" onclick="hideControls(event)">

    <div class="top-controls-right">
        <div class="icon-btn" onclick="toggleOverlay('menuOverlay')" title="القائمة"><i class="fas fa-ellipsis-v"></i></div>
        <div class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="تغيير الثيم"><i class="fas fa-moon"></i></div>
    </div>

    <div class="full-overlay" id="menuOverlay">
        <i class="fas fa-arrow-right close-overlay" onclick="toggleOverlay('menuOverlay')"></i>
        <div class="social-accordion" id="socialAccordion" style="margin-top: 20px;">
            <div class="social-header" onclick="document.getElementById('socialAccordion').classList.toggle('open')">
                <span>مواقع التواصل الأجتماعي</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="social-content">
                <a href="https://www.tiktok.com/@72rxb" target="_blank" class="social-card social-tiktok"><i class="fab fa-tiktok"></i> تيك توك</a>
                <a href="https://www.instagram.com/72rxb" target="_blank" class="social-card social-insta"><i class="fab fa-instagram"></i> انستغرام</a>
                <a href="https://www.facebook.com/share/1D54JBBkJh/" target="_blank" class="social-card social-fb"><i class="fab fa-facebook-f"></i> فيسبوك</a>
                <a href="https://youtube.com/@72rxb" target="_blank" class="social-card social-yt"><i class="fab fa-youtube"></i> يوتيوب</a>
            </div>
        </div>
    </div>

    <div class="full-overlay" id="archiveOverlay">
        <i class="fas fa-arrow-right close-overlay" onclick="toggleOverlay('archiveOverlay')"></i>
        <div style="font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; width: 100%; text-align: center;">أرشيف التحميلات</div>
        <div id="fullHistoryContainer" style="width: 100%; max-width: 550px;"></div>
    </div>

    <div class="brand">WeStars</div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="urlInput" class="input-box" placeholder="...الصق الرابط هنا">
            <i class="fas fa-paste paste-btn" onclick="pasteLink()"></i>
        </div>
        <button class="main-btn" onclick="processVideo()">
            <span id="btnText">استخراج المحتوى</span>
            <i class="far fa-star star-loader" id="starLoader"></i>
        </button>

        <div id="resultCard" class="video-card">
            <div id="videoContainer" class="video-preview" onclick="showControls(event)">
                <div id="imageSlider">
                    <div class="slider-wrapper" id="sliderWrapper"></div>
                    <div class="slider-arrow slider-arrow-prev" onclick="handleArrowClick(1, event)"><i class="fas fa-chevron-left"></i></div>
                    <div class="slider-arrow slider-arrow-next" onclick="handleArrowClick(-1, event)"><i class="fas fa-chevron-right"></i></div>
                    <div class="slider-dots" id="sliderDots"></div>
                </div>

                <video id="videoPlayer" playsinline onclick="handleVideoTap(event)"></video>
                
                <div id="videoEndOverlay" class="video-end-overlay">
                    <div class="replay-icon" onclick="replayVideo()"><i class="fas fa-redo-alt"></i></div>
                </div>

                <div id="skipLeft" class="skip-feedback skip-left"><i class="fas fa-forward"></i><span>10s</span></div>
                <div id="skipRight" class="skip-feedback skip-right"><i class="fas fa-backward"></i><span>10s</span></div>

                <div class="custom-controls" id="controlsLayer">
                    <div class="time-display"><span id="currentTime">00:00</span><span id="totalTime">00:00</span></div>
                    <div class="progress-bar-container" id="progressContainer">
                        <div class="progress-bar-fill" id="progressBar">
                            <div class="progress-handle"></div>
                        </div>
                    </div>
                    <div class="player-btns">
                        <div class="player-btns-group">
                            <i class="fas fa-play" id="playPauseBtn" onclick="togglePlay(event)"></i>
                            <i class="fas fa-volume-up" id="muteBtn" onclick="toggleMute(event)"></i>
                        </div>
                        <i class="fas fa-expand" onclick="toggleFullscreen(event)"></i>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button onclick="downloadNow()" class="btn-action btn-download" style="background:var(--accent);"><span>حفظ</span> <i class="fas fa-download"></i></button>
                <button onclick="copyLink()" class="btn-action btn-copy" style="background:var(--input-border); color:var(--text);"><span>نسخ</span> <i class="fas fa-copy"></i></button>
                <button id="musicDownloadBtn" onclick="downloadMusic()" class="btn-action btn-music-action"><span>حفظ الموسيقى</span> <i class="fas fa-music"></i></button>
                <button onclick="location.reload()" class="btn-action btn-reset" style="background:var(--input-border);"><span>جديد</span> <i class="fas fa-redo"></i></button>
            </div>
        </div>

        <div class="history-section" id="historySection">
            <div class="history-header"><h3>آخر التحميلات:</h3><i class="fas fa-box-archive archive-trigger" onclick="toggleOverlay('archiveOverlay')"></i></div>
            <div id="mainHistoryList"></div>
        </div>
    </div>

    <div id="customAlert"><i id="alertIcon" class="fas fa-info-circle"></i><span id="alertMsg"></span></div>

    <script>
        let currentVideoLink = "", currentMusicLink = "", allImages = [], isImageMode = false, currentImageIndex = 0; 
        const video = document.getElementById('videoPlayer'), imageSlider = document.getElementById('imageSlider'), sliderWrapper = document.getElementById('sliderWrapper');
        const sliderDots = document.getElementById('sliderDots'), musicBtn = document.getElementById('musicDownloadBtn'), controls = document.getElementById('controlsLayer');
        const playPauseBtn = document.getElementById('playPauseBtn'), progressBar = document.getElementById('progressBar'), progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime'), totalTimeEl = document.getElementById('totalTime');

        function showControls(e) { e.stopPropagation(); if(!isImageMode) controls.classList.add('visible'); }
        function hideControls(e) { controls.classList.remove('visible'); }

        let tapCount = 0, tapTimer = null;
        function handleVideoTap(e) {
            if(isImageMode) return;
            tapCount++;
            if (tapCount === 1) { tapTimer = setTimeout(() => { tapCount = 0; }, 300); } 
            else if (tapCount === 2) {
                clearTimeout(tapTimer); tapCount = 0;
                const rect = video.getBoundingClientRect();
                if ((e.clientX - rect.left) > rect.width / 2) { video.currentTime -= 10; showFeedback('skipRight'); } 
                else { video.currentTime += 10; showFeedback('skipLeft'); }
            }
        }
        function showFeedback(id) { const el = document.getElementById(id); el.style.display = 'flex'; setTimeout(() => { el.style.display = 'none'; }, 600); }

        function togglePlay(e) { e.stopPropagation(); if(video.paused) { video.play(); playPauseBtn.className = 'fas fa-pause'; } else { video.pause(); playPauseBtn.className = 'fas fa-play'; } }
        function replayVideo() { video.currentTime = 0; video.play(); document.getElementById('videoEndOverlay').style.display = 'none'; }
        function toggleMute(e) { e.stopPropagation(); video.muted = !video.muted; document.getElementById('muteBtn').className = video.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up'; }
        function toggleFullscreen(e) { e.stopPropagation(); const target = isImageMode ? imageSlider : video; if (target.requestFullscreen) target.requestFullscreen(); else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen(); }

        video.addEventListener('timeupdate', () => { 
            if(!isDragging) { 
                const p = (video.currentTime / video.duration) * 100;
                progressBar.style.width = `${p}%`; 
                currentTimeEl.innerText = formatTime(video.currentTime); 
            } 
        });
        video.addEventListener('loadedmetadata', () => { totalTimeEl.innerText = formatTime(video.duration); });
        video.addEventListener('ended', () => { playPauseBtn.className = 'fas fa-play'; document.getElementById('videoEndOverlay').style.display = 'flex'; });
        function formatTime(s) { if(isNaN(s) || s < 0) return "00:00"; let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m<10?'0'+m:m}:${sec<10?'0'+sec:sec}`; }

        let isDragging = false;
        const updateSeek = (e) => {
            if(isImageMode || !video.duration) return;
            const rect = progressContainer.getBoundingClientRect();
            let clientX = (e.touches ? e.touches[0].clientX : e.clientX);
            let x = clientX - rect.left;
            let pos = Math.max(0, Math.min(x, rect.width)) / rect.width;
            video.currentTime = pos * video.duration;
            progressBar.style.width = `${pos * 100}%`;
        };
        progressContainer.addEventListener('mousedown', (e) => { isDragging = true; updateSeek(e); e.stopPropagation(); });
        progressContainer.addEventListener('touchstart', (e) => { isDragging = true; updateSeek(e); e.stopPropagation(); });
        window.addEventListener('mousemove', (e) => { if(isDragging) updateSeek(e); });
        window.addEventListener('touchmove', (e) => { if(isDragging) updateSeek(e); });
        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('touchend', () => { isDragging = false; });

        function handleArrowClick(direction, e) {
            if (e) e.stopPropagation();
            if (!isImageMode || allImages.length === 0) return;
            // عكس الاتجاه: +1 للسهم الأيمن (Next) و -1 للسهم الأيسر (Prev)
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = allImages.length - 1; 
            if (currentImageIndex >= allImages.length) currentImageIndex = 0; 
            updateSliderPosition();
        }

        function updateSliderPosition() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentImageIndex));
            sliderWrapper.style.transform = `translateX(-${currentImageIndex * 100}%)`; 
            currentVideoLink = allImages[currentImageIndex]; 
        }

        async function processVideo() { 
            const url = document.getElementById('urlInput').value.trim(); 
            if(!url) return notify("ضع الرابط أولاً");
            document.getElementById('btnText').style.display = 'none'; 
            document.getElementById('starLoader').style.display = 'block'; 
            try { 
                let api = url.includes("tiktok.com") ? `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}` : `https://api.boxentriq.com/social/any?url=${encodeURIComponent(url)}`; 
                const res = await fetch(api); const r = await res.json(); const d = r.data;
                if (url.includes("tiktok.com") && d.images && d.images.length > 0) {
                    isImageMode = true; currentImageIndex = 0; 
                    video.style.display = 'none'; imageSlider.style.display = 'block';
                    controls.style.display = 'none'; musicBtn.style.display = 'flex';
                    allImages = d.images; currentMusicLink = d.music || "";
                    sliderWrapper.innerHTML = d.images.map(img => `<img src="${img}" class="slider-img">`).join('');
                    sliderDots.innerHTML = d.images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
                    sliderWrapper.style.transform = 'translateX(0%)';
                    currentVideoLink = d.images[0]; 
                    saveToHistory(url, d.images[0]); notify("تم استخراج الصور ✨");
                } else {
                    isImageMode = false; video.style.display = 'block'; imageSlider.style.display = 'none';
                    controls.style.display = 'flex'; musicBtn.style.display = 'none';
                    currentVideoLink = d?.play || r.video_url || r.url; 
                    if(currentVideoLink) { video.src = currentVideoLink; saveToHistory(url, d?.cover || r.thumbnail || ""); notify("تم استخراج الفيديو ✨"); } else throw Error();
                }
                document.getElementById('resultCard').style.display = 'block';
            } catch { notify("الرابط غير مدعوم"); } 
            finally { document.getElementById('btnText').style.display = 'block'; document.getElementById('starLoader').style.display = 'none'; } 
        }

        function saveToHistory(url, thumb) { 
            let h = JSON.parse(localStorage.getItem('ws_history_v2') || '[]'); 
            h = h.filter(i => i.url !== url); h.unshift({url, thumb}); 
            localStorage.setItem('ws_history_v2', JSON.stringify(h)); renderHistory(); 
        }
        function renderHistory() { 
            const h = JSON.parse(localStorage.getItem('ws_history_v2') || '[]'); 
            const main = document.getElementById('mainHistoryList'), full = document.getElementById('fullHistoryContainer'); 
            if(!h.length) return;
            const html = h.map(i => `<div class="history-item"><div class="history-content"><div class="history-url">${i.url}</div><div class="history-btn" onclick="reDownload('${i.url}')">إعادة تحميل</div></div><img src="${i.thumb}" class="history-thumb"></div>`).join('');
            main.innerHTML = h.slice(0,3).map(i => `<div class="history-item"><div class="history-content"><div class="history-url">${i.url}</div><div class="history-btn" onclick="reDownload('${i.url}')">إعادة تحميل</div></div><img src="${i.thumb}" class="history-thumb"></div>`).join('');
            full.innerHTML = html;
        }
        function toggleOverlay(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleTheme() { 
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        function notify(msg) { const a = document.getElementById('customAlert'); document.getElementById('alertMsg').innerText = msg; a.classList.add('show'); setTimeout(()=>a.classList.remove('show'), 3000); }
        async function pasteLink() { try { const t = await navigator.clipboard.readText(); document.getElementById('urlInput').value = t; notify("تم اللصق"); } catch(e) {} }
        function reDownload(u) { 
            document.getElementById('urlInput').value = u; 
            document.getElementById('archiveOverlay').classList.remove('active');
            processVideo(); 
        }
        async function downloadNow() { if(!currentVideoLink) return; notify("جاري الحفظ..."); const r = await fetch(currentVideoLink); const b = await r.blob(); const u = window.URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = `WeStars_${Date.now()}.${isImageMode?'jpg':'mp4'}`; a.click(); }
        async function downloadMusic() { if(!currentMusicLink) return; notify("جاري حفظ الموسيقى..."); const r = await fetch(currentMusicLink); const b = await r.blob(); const u = window.URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = `Music_${Date.now()}.mp3`; a.click(); }
        function copyLink() { navigator.clipboard.writeText(currentVideoLink); notify("تم النسخ"); }
        window.onload = renderHistory;
    </script>
</body>
</html>
